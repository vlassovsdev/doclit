<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocLit — doclit.vlasovs.tk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0b;--bg2:#111114;--bg3:#18181d;
  --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);
  --text:#f0ede8;--muted:#6b6870;--muted2:#9895a0;
  --accent:#d4f73c;--accent-dim:rgba(212,247,60,0.12);
  --coral:#ff6b47;--green:#4ade80;--red:#f87171;
  --r:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.mono{font-family:'DM Mono',monospace}
h1,h2,h3{font-family:'Syne',sans-serif;font-weight:800;letter-spacing:-0.03em}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--line);background:rgba(10,10,11,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:7px}
.nav-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.nav-right{display:flex;align-items:center;gap:12px}
#user-info{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2)}
.btn{padding:9px 18px;border-radius:6px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-accent{background:var(--accent);color:#0a0a0b}
.btn-accent:hover{background:#c4e732;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--line2)}
.btn-ghost:hover{color:var(--text);border-color:var(--line2)}
.btn-sm{padding:6px 14px;font-size:12px}

/* ── MAIN LAYOUT ── */
main{flex:1;max-width:860px;margin:0 auto;width:100%;padding:48px 24px}

/* ── UPLOAD ZONE ── */
.upload-zone{border:1px dashed rgba(212,247,60,.3);border-radius:12px;padding:56px 40px;text-align:center;cursor:pointer;transition:all .25s;background:rgba(212,247,60,.03);position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--accent-dim)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:40px;margin-bottom:16px;display:block}
.upload-zone h2{font-size:22px;margin-bottom:8px}
.upload-zone p{font-size:14px;color:var(--muted2)}
.upload-formats{display:flex;justify-content:center;gap:8px;margin-top:16px;flex-wrap:wrap}
.tag{font-family:'DM Mono',monospace;font-size:11px;padding:3px 10px;border-radius:4px;border:1px solid var(--line2);color:var(--muted)}

/* ── FILE SELECTED ── */
.file-card{background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:20px 24px;display:flex;align-items:center;gap:16px;margin-top:24px}
.file-icon{width:44px;height:44px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-top:2px}
.file-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:4px;transition:color .2s}
.file-remove:hover{color:var(--red)}

/* ── OPERATIONS ── */
.ops-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:32px 0 14px}
.ops-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.op-btn{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:14px 16px;text-align:left;cursor:pointer;transition:all .2s;color:var(--text)}
.op-btn:hover{border-color:var(--line2);background:var(--bg3)}
.op-btn.active{border-color:var(--accent);background:var(--accent-dim)}
.op-btn-icon{font-size:18px;display:block;margin-bottom:6px}
.op-btn-label{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:-0.01em;display:block}
.op-btn-desc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;display:block}

/* ── OPTIONS ── */
.options-panel{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-top:12px}
.options-panel label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);display:block;margin-bottom:6px}
.options-panel input,.options-panel select{background:var(--bg3);border:1px solid var(--line2);border-radius:6px;color:var(--text);padding:8px 12px;font-family:'DM Mono',monospace;font-size:13px;width:100%;outline:none}
.options-panel input:focus,.options-panel select:focus{border-color:var(--accent)}

/* ── PROCESS BTN ── */
.process-row{margin-top:28px;display:flex;align-items:center;gap:16px}
.btn-process{padding:14px 36px;font-size:15px;font-family:'Syne',sans-serif;font-weight:800}
.btn-process:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

/* ── PROGRESS ── */
.progress-box{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:24px;margin-top:24px}
.progress-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.spinner{width:18px;height:18px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-op{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.progress-bar-wrap{height:4px;background:var(--line);border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;width:0%}
.progress-status{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);margin-top:10px}

/* ── RESULT ── */
.result-box{background:var(--bg2);border:1px solid rgba(74,222,128,.25);border-radius:10px;padding:24px;margin-top:24px;display:flex;align-items:center;gap:20px}
.result-icon{font-size:36px;flex-shrink:0}
.result-info h3{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:4px}
.result-info p{font-size:14px;color:var(--muted2)}
.result-actions{margin-left:auto;display:flex;gap:10px;flex-shrink:0}
.btn-download{background:var(--green);color:#0a0a0b;font-weight:700}
.btn-download:hover{background:#22c55e}

/* ── ERROR ── */
.error-box{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:20px 24px;margin-top:24px;font-family:'DM Mono',monospace;font-size:13px;color:var(--red)}

/* ── AUTH MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:36px;width:100%;max-width:400px}
.modal h2{font-size:24px;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);display:block;margin-bottom:6px}
.form-group input{background:var(--bg3);border:1px solid var(--line2);border-radius:7px;color:var(--text);padding:11px 14px;font-size:14px;width:100%;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-error{font-family:'DM Mono',monospace;font-size:12px;color:var(--red);margin-top:8px}
.modal-tabs{display:flex;gap:0;margin-bottom:28px;border:1px solid var(--line);border-radius:7px;overflow:hidden}
.modal-tab{flex:1;padding:10px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--muted2);transition:all .2s}
.modal-tab.active{background:var(--bg3);color:var(--text)}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}

/* ── HISTORY ── */
.history-section{margin-top:56px}
.history-section h3{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px;letter-spacing:-0.02em}
.history-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.history-item:last-child{border-bottom:none}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.done{background:var(--green)}
.status-dot.error{background:var(--red)}
.status-dot.pending,.status-dot.processing{background:var(--accent);animation:pulse 1s ease-in-out infinite}
.history-op{font-family:'DM Mono',monospace;font-size:13px;flex:1}
.history-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.history-dl{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);text-decoration:none}
.history-dl:hover{text-decoration:underline}

footer{padding:24px 40px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}

@media(max-width:640px){
  nav{padding:14px 16px}
  main{padding:28px 16px}
  .ops-grid{grid-template-columns:1fr 1fr}
  .result-box{flex-direction:column;align-items:flex-start}
  .result-actions{margin-left:0}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo"><span class="nav-dot"></span>DocLit</a>
  <div class="nav-right">
    <span id="user-info"></span>
    <button class="btn btn-ghost btn-sm" id="auth-btn" onclick="openAuth()">Войти</button>
    <button class="btn btn-ghost btn-sm hidden" id="logout-btn" onclick="doLogout()">Выйти</button>
  </div>
</nav>

<!-- AUTH MODAL -->
<div class="modal-overlay hidden" id="auth-modal">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <h2>DocLit</h2>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('login')">Войти</button>
      <button class="modal-tab" onclick="switchTab('register')">Зарегистрироваться</button>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')submitAuth()">
    </div>
    <div class="form-error hidden" id="auth-error"></div>
    <button class="btn btn-accent" style="width:100%;margin-top:8px;padding:13px" id="auth-submit" onclick="submitAuth()">Войти</button>
  </div>
</div>

<!-- MAIN -->
<main>

  <!-- UPLOAD -->
  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" onchange="onFileSelect(event)">
    <span class="upload-icon">📄</span>
    <h2>Перетащите файл или нажмите</h2>
    <p>PDF, DOCX, PNG, JPG — до 10 МБ бесплатно</p>
    <div class="upload-formats">
      <span class="tag">PDF</span><span class="tag">DOCX</span>
      <span class="tag">PNG</span><span class="tag">JPG</span>
    </div>
  </div>

  <!-- FILE CARD -->
  <div id="file-card" style="display:none" class="file-card">
    <div class="file-icon" id="file-icon">📄</div>
    <div class="file-info">
      <div class="file-name" id="file-name-display"></div>
      <div class="file-size" id="file-size-display"></div>
    </div>
    <button class="file-remove" onclick="clearFile()">✕</button>
  </div>

  <!-- OPERATIONS -->
  <div id="ops-section" style="display:none">
    <div class="ops-title">Выберите операцию</div>
    <div class="ops-grid" id="ops-grid">
      <!-- Заполняется динамически -->
    </div>

    <!-- OPTIONS -->
    <div id="options-panel" style="display:none" class="options-panel">
      <div id="options-inner"></div>
    </div>

    <!-- PROCESS -->
    <div class="process-row">
      <button class="btn btn-accent btn-process" id="process-btn" onclick="runJob()" disabled>
        Обработать →
      </button>
      <span id="process-hint" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)"></span>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-box" class="progress-box" style="display:none">
    <div class="progress-header">
      <div class="spinner"></div>
      <div class="progress-op" id="progress-op-name">Обработка...</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="progress-status" id="progress-status">Загрузка файла...</div>
  </div>

  <!-- RESULT -->
  <div id="result-box" class="result-box" style="display:none">
    <div class="result-icon">✅</div>
    <div class="result-info">
      <h3>Готово!</h3>
      <p id="result-desc">Файл обработан успешно</p>
    </div>
    <div class="result-actions">
      <a href="#" class="btn btn-download" id="result-download" download>⬇ Скачать</a>
      <button class="btn btn-ghost" onclick="resetAll()">Новый файл</button>
    </div>
  </div>

  <!-- ERROR -->
  <div id="error-box" class="error-box" style="display:none"></div>

  <!-- HISTORY -->
  <div class="history-section" id="history-section" style="display:none">
    <h3>История заданий</h3>
    <div id="history-list"></div>
  </div>

</main>

<footer>
  <span>DocLit — Documents Literate</span>
  <a href="/" style="color:var(--muted);text-decoration:none">← На главную</a>
</footer>

<script>
const API = '/api';

// ── Операции по типу файла ─────────────────────────────────
const OPS = {
  '.pdf': [
    { id:'pdf_to_docx',  icon:'📝', label:'→ DOCX',       desc:'Word документ' },
    { id:'pdf_to_png',   icon:'🖼️', label:'→ PNG',        desc:'Изображения страниц' },
    { id:'pdf_to_txt',   icon:'🔤', label:'→ TXT / OCR',  desc:'Извлечь текст' },
    { id:'pdf_delete_pages', icon:'✂️', label:'Удалить стр.', desc:'Убрать страницы' },
    { id:'pdf_rotate',   icon:'🔄', label:'Повернуть',    desc:'90 / 180 / 270°' },
  ],
  '.docx': [
    { id:'docx_to_pdf',  icon:'📕', label:'→ PDF',         desc:'Точное форматирование' },
    { id:'img_to_txt',   icon:'🔤', label:'Извлечь текст', desc:'Текстовый слой' },
  ],
  '.doc': [
    { id:'docx_to_pdf',  icon:'📕', label:'→ PDF',         desc:'Через LibreOffice' },
  ],
  '.png': [
    { id:'img_to_txt',   icon:'🔤', label:'OCR текст',     desc:'Распознать текст' },
    { id:'img_to_pdf',   icon:'📄', label:'→ PDF',         desc:'Обернуть в PDF' },
  ],
  '.jpg': [
    { id:'img_to_txt',   icon:'🔤', label:'OCR текст',     desc:'Распознать текст' },
    { id:'img_to_pdf',   icon:'📄', label:'→ PDF',         desc:'Обернуть в PDF' },
  ],
  '.jpeg': [
    { id:'img_to_txt',   icon:'🔤', label:'OCR текст',     desc:'Распознать текст' },
    { id:'img_to_pdf',   icon:'📄', label:'→ PDF',         desc:'Обернуть в PDF' },
  ],
};

const FILE_ICONS = {'.pdf':'📕','.docx':'📘','.doc':'📗','.png':'🖼️','.jpg':'🖼️','.jpeg':'🖼️'};

let selectedFile = null;
let selectedOp   = null;
let uploadedFileId = null;
let currentJobId = null;
let pollTimer    = null;

// ── Auth state ─────────────────────────────────────────────
let token = localStorage.getItem('doclit_token');
let userEmail = localStorage.getItem('doclit_email');
let userPlan  = localStorage.getItem('doclit_plan');

function updateAuthUI() {
  const info = document.getElementById('user-info');
  const loginBtn = document.getElementById('auth-btn');
  const logoutBtn = document.getElementById('logout-btn');
  if (token) {
    info.textContent = `${userEmail} · ${userPlan || 'free'}`;
    loginBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    loadHistory();
  } else {
    info.textContent = '';
    loginBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
  }
}
updateAuthUI();

// ── Auth modal ─────────────────────────────────────────────
let authMode = 'login';
function openAuth() { document.getElementById('auth-modal').classList.remove('hidden'); }
function closeAuth() { document.getElementById('auth-modal').classList.add('hidden'); }
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.modal-tab').forEach((t,i)=>t.classList.toggle('active', (mode==='login'&&i===0)||(mode==='register'&&i===1)));
  document.getElementById('auth-submit').textContent = mode==='login' ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('auth-error').classList.add('hidden');
}
async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass  = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-error');
  errEl.classList.add('hidden');

  if (!email || !pass) { errEl.textContent='Заполните все поля'; errEl.classList.remove('hidden'); return; }

  const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
  try {
    const res = await fetch(API + endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password:pass})
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.detail || 'Ошибка'; errEl.classList.remove('hidden'); return; }
    token = data.token; userEmail = data.email; userPlan = data.plan;
    localStorage.setItem('doclit_token', token);
    localStorage.setItem('doclit_email', userEmail);
    localStorage.setItem('doclit_plan',  userPlan);
    closeAuth(); updateAuthUI();
  } catch(e) { errEl.textContent='Ошибка соединения'; errEl.classList.remove('hidden'); }
}
function doLogout() {
  token=null; userEmail=null; userPlan=null;
  localStorage.removeItem('doclit_token');
  localStorage.removeItem('doclit_email');
  localStorage.removeItem('doclit_plan');
  updateAuthUI();
  document.getElementById('history-section').style.display='none';
}

// ── Drag & Drop ────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e=>{ e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function onFileSelect(e) {
  if (e.target.files[0]) handleFile(e.target.files[0]);
}

function handleFile(file) {
  const ext = ('.' + file.name.split('.').pop()).toLowerCase();
  if (!OPS[ext]) { showError(`Формат ${ext} не поддерживается`); return; }

  selectedFile = file;
  selectedOp = null;
  uploadedFileId = null;

  document.getElementById('drop-zone').style.display = 'none';
  const card = document.getElementById('file-card');
  card.style.display = 'flex';
  document.getElementById('file-icon').textContent = FILE_ICONS[ext] || '📄';
  document.getElementById('file-name-display').textContent = file.name;
  document.getElementById('file-size-display').textContent = formatSize(file.size);

  renderOps(ext);
  document.getElementById('ops-section').style.display = 'block';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('progress-box').style.display = 'none';
}

function clearFile() {
  selectedFile = null; selectedOp = null; uploadedFileId = null;
  document.getElementById('drop-zone').style.display = 'block';
  document.getElementById('file-card').style.display = 'none';
  document.getElementById('ops-section').style.display = 'none';
  document.getElementById('file-input').value = '';
  if (pollTimer) clearInterval(pollTimer);
}

// ── Render operations ──────────────────────────────────────
function renderOps(ext) {
  const grid = document.getElementById('ops-grid');
  grid.innerHTML = '';
  (OPS[ext] || []).forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'op-btn';
    btn.dataset.id = op.id;
    btn.innerHTML = `<span class="op-btn-icon">${op.icon}</span><span class="op-btn-label">${op.label}</span><span class="op-btn-desc">${op.desc}</span>`;
    btn.onclick = () => selectOp(op.id);
    grid.appendChild(btn);
  });
}

function selectOp(opId) {
  selectedOp = opId;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.toggle('active', b.dataset.id === opId));
  document.getElementById('process-btn').disabled = false;
  renderOptions(opId);
}

function renderOptions(opId) {
  const panel = document.getElementById('options-panel');
  const inner = document.getElementById('options-inner');
  inner.innerHTML = '';

  if (opId === 'pdf_delete_pages') {
    inner.innerHTML = `<label>Номера страниц для удаления (через запятую)</label><input type="text" id="opt-pages" placeholder="1, 3, 5">`;
    panel.style.display = 'block';
  } else if (opId === 'pdf_rotate') {
    inner.innerHTML = `<label>Угол поворота</label><select id="opt-angle"><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select>`;
    panel.style.display = 'block';
  } else if (opId === 'img_to_txt') {
    inner.innerHTML = `
      <label>Язык документа</label>
      <select id="opt-lang">
        <option value="rus+eng+kaz">Русский + Английский + Казахский</option>
        <option value="kaz">Только казахский</option>
        <option value="rus+eng">Русский + Английский</option>
        <option value="eng">Только английский</option>
        <option value="rus">Только русский</option>
      </select>`;
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }
}

function getOptions() {
  const opts = {};
  if (selectedOp === 'pdf_delete_pages') {
    const raw = document.getElementById('opt-pages')?.value || '';
    opts.pages = raw.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
  }
  if (selectedOp === 'pdf_rotate') {
    opts.angle = parseInt(document.getElementById('opt-angle')?.value || '90');
  }
  if (selectedOp === 'img_to_txt') {
    opts.lang = document.getElementById('opt-lang')?.value || 'rus+eng';
  }
  return opts;
}

// ── Run job ────────────────────────────────────────────────
async function runJob() {
  if (!selectedFile || !selectedOp) return;

  document.getElementById('process-btn').disabled = true;
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
  showProgress('Загрузка файла...', 10);

  try {
    // 1. Upload
    const formData = new FormData();
    formData.append('file', selectedFile);
    const headers = token ? {Authorization: 'Bearer ' + token} : {};

    const upRes = await fetch(API + '/files/upload', {method:'POST', headers, body:formData});
    if (!upRes.ok) {
      const e = await upRes.json();
      throw new Error(e.detail || 'Ошибка загрузки файла');
    }
    const upData = await upRes.json();
    uploadedFileId = upData.file_id;
    setProgress(35, 'Файл загружен. Создаём задание...');

    // 2. Create job
    const jobRes = await fetch(API + '/jobs/create', {
      method:'POST',
      headers: {'Content-Type':'application/json', ...(token ? {Authorization:'Bearer '+token} : {})},
      body: JSON.stringify({file_id: uploadedFileId, operation: selectedOp, options: getOptions()})
    });
    if (!jobRes.ok) {
      const e = await jobRes.json();
      throw new Error(e.detail || 'Ошибка создания задания');
    }
    const jobData = await jobRes.json();
    currentJobId = jobData.job_id;
    setProgress(50, 'Обрабатываем документ...');

    // 3. Poll
    pollJob();
  } catch(e) {
    hideProgress();
    showError(e.message);
    document.getElementById('process-btn').disabled = false;
  }
}

function pollJob() {
  let ticks = 0;
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(API + '/jobs/' + currentJobId);
      const job = await res.json();

      ticks++;
      const pct = Math.min(50 + ticks * 5, 90);
      setProgress(pct, statusLabel(job.status));

      if (job.status === 'done') {
        clearInterval(pollTimer);
        setProgress(100, 'Готово!');
        setTimeout(() => {
          hideProgress();
          showResult(job.download_url, job.operation);
          loadHistory();
        }, 400);
      } else if (job.status === 'error') {
        clearInterval(pollTimer);
        hideProgress();
        showError('Ошибка обработки: ' + (job.error || 'неизвестная ошибка'));
        document.getElementById('process-btn').disabled = false;
      }
    } catch(e) { /* сеть, продолжаем попытки */ }
  }, 1500);
}

function statusLabel(s) {
  return {pending:'В очереди...',processing:'Обрабатываем...',done:'Готово!',error:'Ошибка'}[s] || s;
}

// ── UI helpers ─────────────────────────────────────────────
function showProgress(text, pct) {
  document.getElementById('progress-box').style.display = 'block';
  document.getElementById('progress-op-name').textContent = selectedOp ? opLabel(selectedOp) : 'Обработка...';
  setProgress(pct, text);
}
function setProgress(pct, text) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-status').textContent = text;
}
function hideProgress() { document.getElementById('progress-box').style.display = 'none'; }

function showResult(url, op) {
  const box = document.getElementById('result-box');
  box.style.display = 'flex';
  document.getElementById('result-download').href = url;
  document.getElementById('result-desc').textContent = `Операция: ${opLabel(op)} — файл готов к скачиванию`;
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = '⚠ ' + msg;
  box.style.display = 'block';
}

function resetAll() {
  clearFile();
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
}

function opLabel(opId) {
  const map = {pdf_to_docx:'PDF → DOCX',pdf_to_png:'PDF → PNG',pdf_to_txt:'PDF → TXT',docx_to_pdf:'DOCX → PDF',img_to_txt:'OCR текст',img_to_pdf:'IMG → PDF',pdf_delete_pages:'Удалить страницы',pdf_rotate:'Повернуть PDF'};
  return map[opId] || opId;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

// ── History ────────────────────────────────────────────────
async function loadHistory() {
  if (!token) return;
  try {
    const res = await fetch(API + '/jobs/', {headers:{Authorization:'Bearer '+token}});
    const jobs = await res.json();
    if (!jobs.length) return;
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    list.innerHTML = jobs.map(j => `
      <div class="history-item">
        <div class="status-dot ${j.status}"></div>
        <div class="history-op">${opLabel(j.operation)}</div>
        <div class="history-time">${timeAgo(j.created_at)}</div>
        ${j.status==='done'&&j.download_url ? `<a class="history-dl" href="${j.download_url}" download>⬇ Скачать</a>` : `<span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)">${statusLabel(j.status)}</span>`}
      </div>`).join('');
    section.style.display = 'block';
  } catch(e) {}
}

function timeAgo(dt) {
  const d = new Date(dt + 'Z');
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
  if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
  return Math.floor(diff/86400) + ' дн назад';
}
